# CI for Product Catalog Service (Go build/test/lint + Docker/GitOps)

name: product-catalog-ci

on:
  # Manual trigger: build and deploy product-catalog on demand.
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/product-catalog/**"
      - "kubernetes/productcatalog/**"
      - ".github/workflows/ci.yaml"
      - ".github/workflows/reusable-service-ci.yaml"
  push:
    branches: [main]
    paths:
      - "src/product-catalog/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/product-catalog
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build -o product-catalog-service .

      - name: Unit tests
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.55.2
          working-directory: src/product-catalog

  docker:
    needs: [build, code-quality]
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-service-ci.yaml
    with:
      service_name: product-catalog
      src_context: src/product-catalog
      dockerfile: src/product-catalog/Dockerfile
      image_name: product-catalog
      k8s_deploy_path: kubernetes/productcatalog/deploy.yaml
      container_name: productcatalogservice
      push_image: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
