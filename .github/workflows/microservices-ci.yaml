# CI for all other shop microservices (Docker build + GitOps manifest update).
#
# Each service gets its own image (like product-catalog). The `changes` job
# detects which services were touched and emits a build matrix containing only
# those services. One Argo CD Application syncs all per-service manifests
# under kubernetes/.

name: microservices-ci

on:
  # Manual trigger: builds and deploys ALL services (initial bootstrap or full rebuild).
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/ad/**"
      - "src/cart/**"
      - "src/checkout/**"
      - "src/currency/**"
      - "src/email/**"
      - "src/frontend/**"
      - "src/frontend-proxy/**"
      - "src/fraud-detection/**"
      - "src/accounting/**"
      - "src/image-provider/**"
      - "src/kafka/**"
      - "src/load-generator/**"
      - "src/payment/**"
      - "src/quote/**"
      - "src/recommendation/**"
      - "src/shipping/**"
      - ".github/workflows/microservices-ci.yaml"
      - ".github/workflows/reusable-service-ci.yaml"
  push:
    branches: [main]
    paths:
      - "src/ad/**"
      - "src/cart/**"
      - "src/checkout/**"
      - "src/currency/**"
      - "src/email/**"
      - "src/frontend/**"
      - "src/frontend-proxy/**"
      - "src/fraud-detection/**"
      - "src/accounting/**"
      - "src/image-provider/**"
      - "src/kafka/**"
      - "src/load-generator/**"
      - "src/payment/**"
      - "src/quote/**"
      - "src/recommendation/**"
      - "src/shipping/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      any_changed: ${{ steps.filter.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services and build matrix
        id: filter
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, subprocess

          # service_name, src prefix, docker context, dockerfile, image, deploy manifest, container
          #
          # Context note: most Dockerfiles here COPY from ./src/<service>/ and
          # the shared ./pb/ folder, so they must be built from the repo root
          # ("."). Only ad, recommendation (and product-catalog in ci.yaml)
          # use their own folder as the build context.
          services = [
            ("ad",              "src/ad",              "src/ad",              "src/ad/Dockerfile",              "ad",              "kubernetes/ad/deploy.yaml",              "adservice"),
            ("cart",            "src/cart",            ".",                   "src/cart/src/Dockerfile",        "cart",            "kubernetes/cart/deploy.yaml",            "cartservice"),
            ("checkout",        "src/checkout",        ".",                   "src/checkout/Dockerfile",        "checkout",        "kubernetes/checkout/deploy.yaml",        "checkoutservice"),
            ("currency",        "src/currency",        ".",                   "src/currency/Dockerfile",        "currency",        "kubernetes/currency/deploy.yaml",        "currencyservice"),
            ("email",           "src/email",           ".",                   "src/email/Dockerfile",           "email",           "kubernetes/email/deploy.yaml",           "emailservice"),
            ("frontend",        "src/frontend",        ".",                   "src/frontend/Dockerfile",        "frontend",        "kubernetes/frontend/deploy.yaml",        "frontend"),
            ("frontend-proxy",  "src/frontend-proxy",  ".",                   "src/frontend-proxy/Dockerfile",  "frontend-proxy",  "kubernetes/frontendproxy/deploy.yaml",   "frontendproxy"),
            ("fraud-detection", "src/fraud-detection", ".",                   "src/fraud-detection/Dockerfile", "fraud-detection", "kubernetes/frauddetection/deploy.yaml",  "frauddetectionservice"),
            ("accounting",      "src/accounting",      ".",                   "src/accounting/Dockerfile",      "accounting",      "kubernetes/accounting/deploy.yaml",      "accountingservice"),
            ("image-provider",  "src/image-provider",  ".",                   "src/image-provider/Dockerfile",  "image-provider",  "kubernetes/imageprovider/deploy.yaml",   "imageprovider"),
            ("kafka",           "src/kafka",           "src/kafka",           "src/kafka/Dockerfile",           "kafka",           "kubernetes/kafka/deploy.yaml",           "kafka"),
            ("load-generator",  "src/load-generator",  ".",                   "src/load-generator/Dockerfile",  "load-generator",  "kubernetes/loadgenerator/deploy.yaml",   "loadgenerator"),
            ("payment",         "src/payment",         ".",                   "src/payment/Dockerfile",         "payment",         "kubernetes/payment/deploy.yaml",         "paymentservice"),
            ("quote",           "src/quote",           ".",                   "src/quote/Dockerfile",           "quote",           "kubernetes/quote/deploy.yaml",           "quoteservice"),
            ("recommendation",  "src/recommendation",  "src/recommendation",  "src/recommendation/Dockerfile",  "recommendation",  "kubernetes/recommendation/deploy.yaml",  "recommendationservice"),
            ("shipping",        "src/shipping",        ".",                   "src/shipping/Dockerfile",        "shipping",        "kubernetes/shipping/deploy.yaml",        "shippingservice"),
          ]

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          if event == "workflow_dispatch":
            # Manual run: build every service (files=None means "no filter").
            files = None
          else:
            if event == "pull_request":
              base = os.environ["GITHUB_BASE_REF"]
              diff_range = f"origin/{base}...HEAD"
            else:
              with open(os.environ["GITHUB_EVENT_PATH"]) as fh:
                before = json.load(fh).get("before", "")
              diff_range = f"{before}...HEAD" if before and not before.startswith("0000000") else "HEAD~1...HEAD"
            try:
              files = subprocess.check_output(
                  ["git", "diff", "--name-only", diff_range], text=True
              ).splitlines()
            except subprocess.CalledProcessError:
              files = []

          include = []
          for name, prefix, context, dockerfile, image, deploy, container in services:
            if files is None or any(f == prefix or f.startswith(prefix + "/") for f in files):
              include.append({
                "service_name": name,
                "src_context": context,
                "dockerfile": dockerfile,
                "image_name": image,
                "k8s_deploy_path": deploy,
                "container_name": container,
              })

          print("changed files:", files)
          print("services to build:", [e["service_name"] for e in include])
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"matrix={json.dumps({'include': include})}\n")
              fh.write(f"any_changed={'true' if include else 'false'}\n")
          PY

  docker:
    needs: changes
    if: needs.changes.outputs.any_changed == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serialize pushes so concurrent jobs do not race on git commit/push.
      max-parallel: 1
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-service-ci.yaml
    with:
      service_name: ${{ matrix.service_name }}
      src_context: ${{ matrix.src_context }}
      dockerfile: ${{ matrix.dockerfile }}
      image_name: ${{ matrix.image_name }}
      k8s_deploy_path: ${{ matrix.k8s_deploy_path }}
      container_name: ${{ matrix.container_name }}
      push_image: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
