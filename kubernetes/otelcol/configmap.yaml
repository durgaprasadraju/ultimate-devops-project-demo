# Minimal OTLP collector for EKS — receives traces/metrics/logs from shop services.
# Exports to debug (stdout) only; Jaeger/Prometheus/OpenSearch are not deployed in this fork.
# Stops "name resolver error" for opentelemetry-demo-otelcol on ports 4317/4318.
apiVersion: v1
kind: ConfigMap
metadata:
  name: opentelemetry-demo-otelcol-config
  labels:
    opentelemetry.io/name: opentelemetry-demo-otelcol
    app.kubernetes.io/instance: opentelemetry-demo
    app.kubernetes.io/component: otelcol
    app.kubernetes.io/name: opentelemetry-demo-otelcol
    app.kubernetes.io/part-of: opentelemetry-demo
data:
  otelcol-config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"

    processors:
      batch:

    exporters:
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
